onboarding = false

[theme]
# Defer to the terminal (ghostty) palette in both light and dark, so herdr
# never paints its own theme over the terminal (avoids the light-mode white
# background bleed). ghostty handles the actual light/dark switching.
auto_switch = true
dark_name = "terminal"
light_name = "terminal"

[ui]
show_agent_labels_on_pane_borders = true
# Surface agents that need attention first
agent_panel_sort = "priority"

[ui.toast]
# Deliver completion / input-request notifications to macOS Notification Center
delivery = "system"

[experimental]
# Japanese IME support on macOS
reveal_hidden_cursor_for_cjk_ime = true
switch_ascii_input_source_in_prefix = true
